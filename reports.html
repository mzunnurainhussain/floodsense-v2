<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Situation Reports — FloodSense AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <script>tailwind.config={theme:{extend:{colors:{radar:{400:'#2dd6f5',500:'#08bbd9'},surface:{900:'#060d18',800:'#0b1628',700:'#0f2040',600:'#142b55',500:'#1a3668'}},fontFamily:{mono:['JetBrains Mono','monospace'],sans:['Inter','sans-serif'],display:['Space Grotesk','sans-serif']}}}}</script>
  <style>
    @media print {
      header, .no-print { display: none !important; }
      body { background: white; color: black; font-size: 11pt; }
      .report-paper { box-shadow: none !important; border: 1px solid #ccc; margin: 0; }
      .print-invert { filter: invert(1); }
    }
  </style>
</head>
<body class="bg-surface-900 text-white font-sans min-h-screen">
  <header class="sticky top-0 z-50 bg-surface-800 border-b border-white/10 px-6 py-3 flex items-center justify-between no-print">
    <div class="flex items-center gap-4">
      <a href="index.html" class="flex items-center gap-2"><div class="w-7 h-7 rounded-md bg-radar-500 flex items-center justify-center"><svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg></div><span class="font-display font-bold text-sm">FloodSense<span class="text-radar-400"> AI</span></span></a>
      <nav class="hidden md:flex items-center gap-4 text-xs text-white/50">
        <a href="dashboard.html" class="hover:text-white">Command</a><a href="map.html" class="hover:text-white">Map</a><a href="alerts.html" class="hover:text-white">Alerts</a><a href="analytics.html" class="hover:text-white">Analytics</a><a href="reports.html" class="text-radar-400 font-medium">Reports</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <div class="font-mono text-xs text-white/60">PKT <span id="live-clock" class="text-white"></span></div>
      <button onclick="window.print()" class="bg-radar-500 hover:bg-radar-400 text-white text-xs font-medium px-4 py-2 rounded-lg transition-all flex items-center gap-2">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
        Print / Export PDF
      </button>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-6 py-8">
    <!-- Report type selector -->
    <div class="flex gap-3 mb-8 no-print flex-wrap">
      <button class="report-tab text-sm px-4 py-2.5 rounded-lg border border-radar-500/40 bg-radar-500/10 text-radar-400 font-medium" onclick="showReport('sitrep', this)">SitRep</button>
      <button class="report-tab text-sm px-4 py-2.5 rounded-lg border border-white/20 text-white/60 hover:border-white/40" onclick="showReport('pop', this)">Population Exposure</button>
      <button class="report-tab text-sm px-4 py-2.5 rounded-lg border border-white/20 text-white/60 hover:border-white/40" onclick="showReport('resources', this)">Resource Status</button>
      <button class="report-tab text-sm px-4 py-2.5 rounded-lg border border-white/20 text-white/60 hover:border-white/40" onclick="showReport('forecast', this)">Forecast Summary</button>
    </div>

    <!-- Report paper -->
    <div id="report-paper" class="report-paper bg-white text-gray-900 rounded-2xl shadow-2xl p-10 no-screen:p-0">
      <div id="report-content"></div>
    </div>
  </div>

  <script src="src/utils/sim.js"></script>
  <script src="src/components/nav.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const S = window.SIM;

    const reports = {
      sitrep: () => `
        <div class="flex items-start justify-between mb-6 pb-6 border-b-2 border-gray-800">
          <div>
            <div class="text-xs font-mono text-gray-500 mb-1">SITUATION REPORT · AUTO-GENERATED BY FLOODSENSE AI</div>
            <h1 class="text-2xl font-bold text-gray-900 font-display">Incident SitRep #001</h1>
            <h2 class="text-lg text-gray-600 mt-1">${S.incident.name}</h2>
          </div>
          <div class="text-right text-xs text-gray-500 font-mono">
            <div>ID: ${S.incident.id}</div>
            <div>Generated: ${new Date().toLocaleString('en-PK')}</div>
            <div>Elapsed: ${S.elapsed()}</div>
          </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-red-600 font-mono">${S.fmt(S.incident.atRisk)}</div>
            <div class="text-xs text-red-500 mt-0.5">Population at risk</div>
          </div>
          <div class="bg-green-50 border border-green-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-green-600 font-mono">${S.fmt(S.incident.evacuated)}</div>
            <div class="text-xs text-green-500 mt-0.5">Evacuated to date</div>
          </div>
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-amber-600 font-mono">${S.incident.distressSignals}</div>
            <div class="text-xs text-amber-500 mt-0.5">Distress signals</div>
          </div>
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
            <div class="text-2xl font-bold text-blue-600 font-mono">${S.incident.activeSectors}</div>
            <div class="text-xs text-blue-500 mt-0.5">Active sectors</div>
          </div>
        </div>

        <div class="mb-6">
          <h3 class="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide border-b pb-2">Executive Summary</h3>
          <p class="text-sm text-gray-700 leading-relaxed">A Category-3 cyclone made landfall on the Sindh coast at 01:15 PKT. Three river gauges are above critical threshold, with the Indus at Kotri recording 487,230 cusecs (+23% in 2 hours). FloodSense AI has identified <strong>7 affected census blocks</strong> with a combined at-risk population of <strong>${S.fmt(S.incident.atRisk)}</strong>. <strong>${S.fmt(S.incident.evacuated)}</strong> residents have been evacuated. <strong>${S.incident.distressSignals} distress signals</strong> detected via BERTweet NLP, 2 critical unresponded. EOC: ${S.incident.eoс}. Incident Commander: ${S.incident.commander}.</p>
        </div>

        <div class="mb-6">
          <h3 class="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide border-b pb-2">Evacuation Priority — AI Ranked</h3>
          <table class="w-full text-xs border-collapse">
            <thead><tr class="bg-gray-100">
              <th class="text-left p-2 border border-gray-200">#</th>
              <th class="text-left p-2 border border-gray-200">Sector</th>
              <th class="text-left p-2 border border-gray-200">Status</th>
              <th class="text-right p-2 border border-gray-200">Population</th>
              <th class="text-right p-2 border border-gray-200">Vulnerability</th>
              <th class="text-right p-2 border border-gray-200">Flood Depth</th>
            </tr></thead>
            <tbody>
              ${S.censusBlocks.map(b=>`<tr class="${b.priority<=2?'bg-red-50':b.priority<=4?'bg-amber-50':''}">
                <td class="p-2 border border-gray-200 font-mono">${b.priority}</td>
                <td class="p-2 border border-gray-200 font-semibold">${b.name}</td>
                <td class="p-2 border border-gray-200"><span class="font-semibold ${b.status==='EVACUATE'?'text-red-600':b.status==='WARNING'?'text-amber-600':'text-gray-500'}">${b.status}</span></td>
                <td class="p-2 border border-gray-200 text-right font-mono">${b.pop.toLocaleString()}</td>
                <td class="p-2 border border-gray-200 text-right font-mono font-semibold ${b.vuln>75?'text-red-600':b.vuln>50?'text-amber-600':'text-green-600'}">${b.vuln}/100</td>
                <td class="p-2 border border-gray-200 text-right font-mono">${b.floodDepth}m</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>

        <div class="mb-6">
          <h3 class="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide border-b pb-2">Gauge Status</h3>
          ${S.gauges.map(g=>{
            const pct = g.current/g.threshold.critical;
            return `<div class="flex items-center gap-3 mb-2">
              <span class="text-xs font-medium text-gray-700 w-48">${g.name}</span>
              <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full rounded-full ${pct>=1?'bg-red-500':pct>=0.85?'bg-amber-500':'bg-green-500'}" style="width:${Math.min(100,pct*100).toFixed(0)}%"></div>
              </div>
              <span class="text-xs font-mono text-gray-600">${g.current.toLocaleString()} / ${g.threshold.critical.toLocaleString()}</span>
              <span class="text-xs font-semibold ${pct>=1?'text-red-600':pct>=0.85?'text-amber-600':'text-green-600'}">${pct>=1?'CRITICAL':pct>=0.85?'WARNING':'OK'}</span>
            </div>`;
          }).join('')}
        </div>

        <div class="grid grid-cols-2 gap-6 mb-6">
          <div>
            <h3 class="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide border-b pb-2">Immediate Actions Required</h3>
            <ol class="text-xs text-gray-700 space-y-2 list-decimal list-inside">
              <li><strong>Qasimabad North (V:87):</strong> Continue boat rescue — 2 critical distress signals active</li>
              <li><strong>Latifabad Unit-8 (V:79):</strong> NDMA Bravo en route — ETA 04:35 — dispatch additional unit</li>
              <li><strong>Tando Allahyar (V:74):</strong> Relief camp at capacity — identify overflow shelter</li>
              <li><strong>Phuleli Canal breach risk:</strong> 18,400 cusecs — above critical — pre-position flood barriers</li>
            </ol>
          </div>
          <div>
            <h3 class="font-bold text-gray-900 mb-3 text-sm uppercase tracking-wide border-b pb-2">AI System Status</h3>
            <div class="text-xs text-gray-700 space-y-1.5">
              <div class="flex justify-between"><span>U-Net CNN (flood map):</span><span class="font-mono text-green-600">0.89 IoU · 94% conf</span></div>
              <div class="flex justify-between"><span>LSTM (discharge forecast):</span><span class="font-mono text-green-600">Active · ±σ bands</span></div>
              <div class="flex justify-between"><span>Random Forest (vulnerability):</span><span class="font-mono text-green-600">7 blocks scored</span></div>
              <div class="flex justify-between"><span>BERTweet NLP (distress):</span><span class="font-mono text-amber-600">47 signals · 2 unresponded</span></div>
              <div class="flex justify-between"><span>Data streams active:</span><span class="font-mono text-green-600">8/8</span></div>
              <div class="flex justify-between"><span>Decision latency:</span><span class="font-mono text-green-600">&lt;3 minutes</span></div>
            </div>
          </div>
        </div>

        <div class="text-xs text-gray-400 text-center pt-4 border-t border-gray-200">
          Auto-generated by FloodSense AI · IEEE Response Quest 2026 · Muhammad Zunnurain Hussain · IEEE #92687282 · This report is AI-assisted — human verification required before acting on recommendations.
        </div>`,

      pop: () => `
        <div class="mb-6 pb-4 border-b-2 border-gray-800">
          <div class="text-xs font-mono text-gray-500 mb-1">POPULATION EXPOSURE REPORT · AUTO-GENERATED</div>
          <h1 class="text-2xl font-bold font-display">Population Exposure Analysis</h1>
          <div class="text-sm text-gray-500 mt-1">Generated: ${new Date().toLocaleString('en-PK')} · FloodSense AI</div>
        </div>
        <p class="text-sm text-gray-700 mb-6">The Random Forest model intersects real-time flood extent (U-Net) with census block demographics to produce per-block vulnerability scores on a 0–100 scale. Higher scores indicate greater rescue priority.</p>
        ${S.censusBlocks.map(b=>`
          <div class="mb-5 p-4 border border-gray-200 rounded-lg ${b.priority<=2?'border-red-300 bg-red-50':b.priority<=4?'border-amber-300 bg-amber-50':''}">
            <div class="flex items-start justify-between mb-3">
              <div>
                <span class="font-bold text-gray-900">${b.priority}. ${b.name}</span>
                <span class="ml-2 text-xs text-gray-500">${b.district} District</span>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-xs font-mono font-bold ${b.vuln>75?'text-red-600':b.vuln>50?'text-amber-600':'text-green-600'}">V:${b.vuln}/100</span>
                <span class="text-xs font-semibold ${b.status==='EVACUATE'?'text-red-600':b.status==='WARNING'?'text-amber-600':'text-gray-500'}">${b.status}</span>
              </div>
            </div>
            <div class="grid grid-cols-5 gap-3 text-xs">
              <div><div class="font-semibold text-gray-700">${b.pop.toLocaleString()}</div><div class="text-gray-500">Population</div></div>
              <div><div class="font-semibold text-gray-700">${b.age65}%</div><div class="text-gray-500">Age 65+</div></div>
              <div><div class="font-semibold text-gray-700">${b.disabled}%</div><div class="text-gray-500">Disabled</div></div>
              <div><div class="font-semibold text-gray-700">${b.noVehicle}%</div><div class="text-gray-500">No vehicle</div></div>
              <div><div class="font-semibold text-gray-700">${b.floodDepth}m</div><div class="text-gray-500">Flood depth</div></div>
            </div>
          </div>`).join('')}
        <div class="text-xs text-gray-400 text-center pt-4 border-t border-gray-200">FloodSense AI · CDC SVI · US Census ACS · Random Forest Model</div>`,

      resources: () => `
        <div class="mb-6 pb-4 border-b-2 border-gray-800">
          <div class="text-xs font-mono text-gray-500 mb-1">RESOURCE STATUS REPORT · AUTO-GENERATED</div>
          <h1 class="text-2xl font-bold font-display">Resource Deployment Status</h1>
          <div class="text-sm text-gray-500 mt-1">Generated: ${new Date().toLocaleString('en-PK')}</div>
        </div>
        <table class="w-full text-xs border-collapse mb-6">
          <thead><tr class="bg-gray-100">
            <th class="text-left p-2 border border-gray-200">Unit</th>
            <th class="text-left p-2 border border-gray-200">Type</th>
            <th class="text-left p-2 border border-gray-200">Status</th>
            <th class="text-left p-2 border border-gray-200">Sector</th>
            <th class="text-left p-2 border border-gray-200">ETA</th>
          </tr></thead>
          <tbody>
          ${S.resources.map(r=>`<tr class="${r.status==='DEPLOYED'||r.status==='ACTIVE'?'bg-green-50':r.status==='EN_ROUTE'?'bg-amber-50':''}">
            <td class="p-2 border border-gray-200 font-semibold">${r.unit}</td>
            <td class="p-2 border border-gray-200">${r.type}</td>
            <td class="p-2 border border-gray-200 font-semibold ${r.status==='DEPLOYED'||r.status==='ACTIVE'?'text-green-600':r.status==='EN_ROUTE'?'text-amber-600':'text-gray-500'}">${r.status}</td>
            <td class="p-2 border border-gray-200">${r.sector}</td>
            <td class="p-2 border border-gray-200 font-mono">${r.eta||'—'}</td>
          </tr>`).join('')}
          </tbody>
        </table>
        <div class="text-xs text-gray-400 text-center pt-4 border-t border-gray-200">FloodSense AI Resource Tracker</div>`,

      forecast: () => `
        <div class="mb-6 pb-4 border-b-2 border-gray-800">
          <div class="text-xs font-mono text-gray-500 mb-1">90-MINUTE FORECAST SUMMARY · AUTO-GENERATED</div>
          <h1 class="text-2xl font-bold font-display">Streamflow Forecast Summary</h1>
          <div class="text-sm text-gray-500 mt-1">LSTM Model · Generated: ${new Date().toLocaleString('en-PK')}</div>
        </div>
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
          <div class="font-bold text-red-700 mb-1">⚠ Peak Flood Warning</div>
          <p class="text-sm text-red-600">Indus at Kotri forecast to reach <strong>563,000 cusecs</strong> within 90 minutes (T+90 PKT ~06:00). Critical threshold: 450,000 cusecs. Uncertainty band: 517,000–609,000 cusecs (±1σ). Immediate downstream evacuation recommended for Qasimabad and Latifabad sectors.</p>
        </div>
        ${S.gauges.map((g,i)=>{
          const f = S.forecasts['G-INDUS-01'];
          const scale = i===0?1:i===1?0.0378:0.0189;
          return `<div class="mb-4 p-4 border border-gray-200 rounded-lg">
            <div class="font-bold text-gray-900 mb-2">${g.name}</div>
            <div class="flex gap-4 text-xs flex-wrap mb-3">
              <div><div class="font-mono font-semibold">${g.current.toLocaleString()}</div><div class="text-gray-500">Current</div></div>
              <div><div class="font-mono font-semibold">${Math.round(f[2].val*scale).toLocaleString()}</div><div class="text-gray-500">T+30m</div></div>
              <div><div class="font-mono font-semibold">${Math.round(f[4].val*scale).toLocaleString()}</div><div class="text-gray-500">T+60m</div></div>
              <div class="${Math.round(f[6].val*scale)>=g.threshold.critical?'text-red-600':'text-gray-900'}"><div class="font-mono font-semibold">${Math.round(f[6].val*scale).toLocaleString()}</div><div class="text-gray-500">T+90m (peak)</div></div>
              <div><div class="font-mono font-semibold text-gray-500">${g.threshold.critical.toLocaleString()}</div><div class="text-gray-500">Critical threshold</div></div>
            </div>
            <div class="text-xs text-gray-500">Trend: <span class="font-semibold ${g.trend==='rising'?'text-red-600':'text-green-600'}">${g.trend.toUpperCase()} ${g.changePct>0?'+':''}${g.changePct}% / 2hr</span></div>
          </div>`;
        }).join('')}
        <p class="text-xs text-gray-500 mt-4">All forecasts use a bidirectional LSTM trained on 20 years of USGS stream gauge records (350 stations). Uncertainty bands represent ±1σ calibrated prediction intervals. Past model performance: RMSE within 8% on held-out flood events.</p>
        <div class="text-xs text-gray-400 text-center pt-4 border-t border-gray-200">FloodSense AI · Bidirectional LSTM · IEEE Response Quest 2026</div>`
    };

    window.showReport = (type, btn) => {
      document.querySelectorAll('.report-tab').forEach(b => { b.className = 'report-tab text-sm px-4 py-2.5 rounded-lg border border-white/20 text-white/60 hover:border-white/40'; });
      btn.className = 'report-tab text-sm px-4 py-2.5 rounded-lg border border-radar-500/40 bg-radar-500/10 text-radar-400 font-medium';
      document.getElementById('report-content').innerHTML = reports[type]();
    };

    showReport('sitrep', document.querySelector('.report-tab'));
  });
  </script>
</body>
</html>
